# =============================================================================
# Kong Gateway — Declarative Configuration (DB-less mode, kong 3.9.x)
# =============================================================================
#
# Kong routes REST requests directly to the microservice REST controllers.
# Kong has NO knowledge of GraphQL, Apollo, or Federation.
# Each service exposes both /graphql (for Apollo Router) and REST routes (for Kong).
#
# Kong architecture:
#   Client → Kong :8000 → user-service :3001 /users/*
#                       → blog-service :3002 /blogs/*
#
# Run Kong:
#   docker run -d --name kong \
#     -e KONG_DATABASE=off \
#     -e KONG_DECLARATIVE_CONFIG=/etc/kong/kong.yml \
#     -e KONG_PROXY_LISTEN=0.0.0.0:8000 \
#     -e KONG_ADMIN_LISTEN=0.0.0.0:8001 \
#     -e KONG_ROUTER_FLAVOR=expressions \
#     -v $(pwd)/kong-gateway/kong.yml:/etc/kong/kong.yml:ro \
#     --add-host=host.docker.internal:host-gateway \
#     -p 8000:8000 -p 8001:8001 \
#     kong:3.9
# =============================================================================

_format_version: '3.0'
_transform: true

services:

  # ── user-service upstream ──────────────────────────────────────────────────
  - name: user-service
    url: http://host.docker.internal:3001
    connect_timeout: 30000
    read_timeout: 30000
    write_timeout: 30000
    retries: 3
    routes:
      - name: users-collection       # GET /users, POST /users
        methods: [GET, POST]
        paths: [/users]
        strip_path: false

      - name: users-by-id            # GET|PUT|DELETE /users/:id
        methods: [GET, PUT, DELETE]
        paths:
          - ~/users/(?<id>[^/]+)$
        strip_path: false

  # ── blog-service upstream ──────────────────────────────────────────────────
  - name: blog-service
    url: http://host.docker.internal:3002
    connect_timeout: 30000
    read_timeout: 30000
    write_timeout: 30000
    retries: 3
    routes:
      - name: blogs-collection       # GET /blogs, POST /blogs
        methods: [GET, POST]
        paths: [/blogs]
        strip_path: false

      - name: blogs-by-id            # GET|PUT|DELETE /blogs/:id
        methods: [GET, PUT, DELETE]
        paths:
          - ~/blogs/(?<id>[^/]+)$
        strip_path: false
