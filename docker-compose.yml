version: "3.9"

# =============================================================================
# Infrastructure — Kafka + Kong
# NestJS services and Apollo Router run as host processes (no Docker).
# =============================================================================
#
# New in this revision
# ─────────────────────
# kafka-init  — one-shot container that pre-creates DLQ topics before services
#               start. Without this, DLQ topics are auto-created on first write,
#               but pre-creating lets you set retention, replication, etc.
#
# DLQ topics created
#   user.events.dlq  — failed user-service Kafka consumer messages
#   blog.events.dlq  — failed blog-service Kafka consumer messages
# =============================================================================

services:

  # ── Zookeeper ──────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.8.0
    container_name: zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports: ["2181:2181"]
    networks: [infra-net]

  # ── Kafka Broker ───────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.8.0
    container_name: kafka
    restart: unless-stopped
    depends_on: [zookeeper]
    ports: ["9092:9092", "29092:29092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
    networks: [infra-net]
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Kafka Topic Initialiser (DLQ topics) ──────────────────────────────────
  # Runs once, creates DLQ topics with explicit retention, then exits.
  # Services may auto-create topics too (allowAutoTopicCreation: true) but
  # pre-creating DLQs here ensures correct retention/replication settings.
  kafka-init:
    image: confluentinc/cp-kafka:7.8.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    networks: [infra-net]
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      echo 'Waiting for Kafka...'
      sleep 5

      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
        --topic user.events.dlq \
        --partitions 1 \
        --replication-factor 1 \
        --config retention.ms=604800000

      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
        --topic blog.events.dlq \
        --partitions 1 \
        --replication-factor 1 \
        --config retention.ms=604800000

      echo 'DLQ topics created.'
      "
    restart: "no"

  # ── Kafka UI ───────────────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    restart: unless-stopped
    depends_on: [kafka]
    ports: ["8080:8080"]
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks: [infra-net]

  # ── Kong API Gateway (DB-less) ─────────────────────────────────────────────
  kong:
    image: kong:3.9
    container_name: kong
    restart: unless-stopped
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
      KONG_ROUTER_FLAVOR: expressions
    ports: ["8000:8000", "8001:8001"]
    volumes:
      - ./kong-gateway/kong.yml:/etc/kong/kong.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks: [infra-net]
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

networks:
  infra-net:
    driver: bridge
