# =============================================================================
# Apollo Router — Supergraph Composition Config
# =============================================================================
#
# Used by Rover CLI to compose the supergraph SDL from both subgraphs.
#
# PREREQUISITES
# ─────────────
# • user-service running on :3001
# • blog-service  running on :3002
# • Rover CLI installed: npm install -g @apollo/rover
#
# USAGE
# ─────
# cd apollo-router
# rover supergraph compose --config supergraph.yaml > supergraph.graphql
#
# Re-run whenever a subgraph schema changes.
# =============================================================================

federation_version: =2.9.0

subgraphs:
  user-service:
    routing_url: http://localhost:4001/graphql
    schema:
      subgraph_url: http://localhost:4001/graphql

  blog-service:
    routing_url: http://localhost:4002/graphql
    schema:
      subgraph_url: http://localhost:4002/graphql
