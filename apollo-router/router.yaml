# =============================================================================
# Apollo Router — Runtime Configuration
# =============================================================================
#
# START COMMAND (from apollo-router/ directory):
#   ./router --config router.yaml --supergraph supergraph.graphql
#
# Download binary:
#   curl -sSL https://router.apollo.dev/download/nix/latest | sh
# =============================================================================

supergraph:
  listen: 0.0.0.0:4000

cors:
  allow_any_origin: true
  allow_headers:
    - content-type
    - x-correlation-id
    - authorization

homepage:
  enabled: true

sandbox:
  enabled: true

include_subgraph_errors:
  all: true   # Surface subgraph errors in dev — disable in production

health_check:
  listen: 0.0.0.0:4000
  enabled: true
  path: /health
