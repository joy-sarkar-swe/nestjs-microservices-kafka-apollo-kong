# =============================================================================
# Apollo Router — Runtime Configuration
# =============================================================================
#
# START COMMAND (from apollo-router/ directory):
#   ./router --config router.yaml --supergraph supergraph.graphql
#
# Download binary:
#   curl -sSL https://router.apollo.dev/download/nix/latest | sh
# =============================================================================

supergraph:
  listen: 127.0.0.1:4000
  introspection: true

cors:
  allow_any_origin: true
  allow_headers:
    - content-type
    - x-correlation-id
    - authorization

sandbox:
  enabled: true

homepage:
  enabled: false

include_subgraph_errors:
  all: true

health_check:
  listen: 127.0.0.1:4000
  enabled: true
  path: /health
